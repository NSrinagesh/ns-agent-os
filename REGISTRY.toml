# agent-os Registry
# Master catalog of all personas, capabilities, and base docs.
# One entry per artifact. Update this file whenever a doc is
# added, versioned, or deprecated.

[meta]
version = "0.1"
last_updated = "2026-05"
maintainer = "agent-architect"

# ─────────────────────────────────────────
# BASE DOCS
# Loaded for every agent on every call.
# Stable cache prefix — never add dynamic content.
# Load order is enforced: 1 → 2 → 3 → 4
# ─────────────────────────────────────────

[[base]]
order = 1
name = "agent-design-standards"
file = "base/agent-design-standards.md"
description = "Behavioral standards for all agents — operating mode, decision authority, escalation, reasoning standards"
version = "0.3"
status = "draft"
tags = ["behavior", "standards", "reasoning"]

[[base]]
order = 2
name = "output-standards"
file = "base/output-standards.md"
description = "Output format, structured output rules, response discipline, prohibited content"
version = "0.2"
status = "draft"
tags = ["output", "format", "standards"]

[[base]]
order = 3
name = "mcp-integration-patterns"
file = "base/mcp-integration-patterns.md"
description = "Tool call principles, auth, error handling, logging, data classification, security constraints"
version = "0.1"
status = "draft"
tags = ["mcp", "tools", "integration", "security"]

[[base]]
order = 4
name = "context-management"
file = "base/context-management.md"
description = "Context loading, prompt caching, memory, RAG, session boundaries, context window discipline"
version = "0.1"
status = "draft"
tags = ["context", "memory", "rag", "caching"]

